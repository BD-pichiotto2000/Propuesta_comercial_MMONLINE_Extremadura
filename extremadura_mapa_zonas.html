      background: rgba(15, 20, 40, 0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.78rem;
      line-height: 1.8;
      backdrop-filter: blur(6px);
      min-width: 195px;
    }
    .legend h4 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 6px;
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 3px;
    }
    .legend-dot {
      width: 13px; height: 13px; border-radius: 50%;

    .legend-text { color: #ddd; }
    .legend-price { color: #aaa; font-size: 0.72rem; margin-left: auto; padding-left: 6px; }

      position: fixed;
      bottom: 20px; right: 20px;
      background: rgba(15, 20, 40, 0.97);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.82rem;
      min-width: 230px;
      max-width: 270px;
      display: none;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #info-panel .close-btn {
      position: absolute; top: 8px; right: 10px;
      cursor: pointer; color: #aaa; font-size: 1rem;
    }

      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.9rem;

      border-radius: 4px;
      font-weight: 600;
      font-size: 0.78rem;

      color: #fff;

// Colores por día de reparto
const DIA_COLORS = {
  'LUNES':                    '#00bcd4',
  'MARTES':                   '#8bc34a',
  'MIERCOLES':                '#ff9800',
  'JUEVES':                   '#9c27b0',
  'VIERNES':                  '#f44336',
  'LUNES, MIERCOLES, VIERNES':'#00acc1',
  'LUNES, MARTES Y JUEVES':   '#43a047',
  'LUNES, VIERNES':           '#26c6da',
  'MARTES Y JUEVES':          '#7b1fa2',
  'LUNES, JUEVES Y VIERNES':  '#e91e63',
  'LUNES A VIERNES':          '#ffd600',
};

function getDiaColor(dia) {
  if (!dia) return '#444';
  const d = dia.toUpperCase();
  if (DIA_COLORS[d]) return DIA_COLORS[d];
  if (d.includes('LUNES') && d.includes('VIERNES')) return '#00acc1';
  if (d.includes('LUNES') && d.includes('JUEVES')) return '#43a047';
  if (d.includes('MARTES') && d.includes('JUEVES')) return '#7b1fa2';
  if (d.includes('LUNES')) return '#00bcd4';
  if (d.includes('MARTES')) return '#8bc34a';
  if (d.includes('MIERCOLES')) return '#ff9800';
  if (d.includes('JUEVES')) return '#9c27b0';
  if (d.includes('VIERNES')) return '#f44336';
  return '#666';
}

  });
}

  seen[key] = { ...m, cps: [m.cp] };
});

// Función auxiliar: obtiene el día de un CP (busca en cpDias todos los CPs del municipio)
function getDiaPorCps(cps) {
  for (const cp of cps) {
    const key = cp.replace(/\D/g,'').padStart(5,'0');
    if (cpDias[key]) return cpDias[key];
  }
  // fallback: buscar sin padding
  for (const cp of cps) {
    if (cpDias[cp]) return cpDias[cp];
  }
  return 'PENDIENTE';
}

// Crear marcadores guardando referencia
Object.values(seen).forEach(m => {
  const diaReal = getDiaPorCps(m.cps);
  const marker = L.marker([m.lat, m.lon], { icon: makeIcon(m.zona, diaReal, modoVista) }).addTo(map);
  todosMarkersData.push({ marker, data: { ...m, diaReal } });

  marker.on('click', () => {
    document.getElementById('ip-municipio').textContent = m.mun;
    document.getElementById('ip-provincia').textContent = m.prov;
    document.getElementById('ip-cp').textContent = m.cps.join(' / ');
    document.getElementById('ip-dist').textContent = m.dist + ' km';
    const zEl = document.getElementById('ip-zona');
    zEl.textContent = 'ZONA ' + m.zona;
    zEl.style.background = ZONAS[m.zona].color;
    zEl.style.color = ['A','B','C'].includes(m.zona) ? '#111' : '#fff';
    const precio = parseInt(ZONAS[m.zona].precio);
    const iva = (precio * 0.21).toFixed(2);
    const total = (precio * 1.21).toFixed(2);
    document.getElementById('ip-base').textContent = precio + ' €';
    document.getElementById('ip-iva').textContent = iva + ' €';
    document.getElementById('ip-total').textContent = total + ' €';
    const diaEl = document.getElementById('ip-dia');
    const diaVal = diaReal;
    diaEl.textContent = diaVal;
    diaEl.style.background = getDiaColor(diaVal);
    diaEl.style.color = '#fff';
    document.getElementById('info-panel').style.display = 'block';
  });
});

// ---- Función de filtrado por día ----
function filtrarDia(dia) {
  filtroActivo = dia;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  todosMarkersData.forEach(({marker, data}) => {
    const diaM = (data.diaReal || '').toUpperCase();
    const mostrar = dia === 'TODOS' || diaM.includes(dia);
    if (mostrar) {
      if (!map.hasLayer(marker)) marker.addTo(map);
    } else {
      if (map.hasLayer(marker)) map.removeLayer(marker);
    }
  });
}

// Marcador especial Badajoz origen
L.circleMarker(origen, {
  radius: 10, color: '#fff', weight: 2,
  fillColor: '#e94560', fillOpacity: 1
}).addTo(map).bindTooltip('<b>📍 Badajoz – Origen</b><br>CP 06007', { permanent: false });

// ============================================================
// LEYENDA
// ============================================================
const legend = L.control({ position: 'topleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `<h4>🗺 Zonas Tarifarias</h4>`;
  Object.entries(ZONAS).forEach(([z, info]) => {
    div.innerHTML += `
      <div class="legend-row">
        <div class="legend-dot" style="background:${info.color}"></div>
        <span class="legend-text"><b>Zona ${z}</b> · ${info.label}</span>
        <span class="legend-price">${info.total}</span>
      </div>`;
  });
  div.innerHTML += `<div style="margin-top:8px;font-size:0.7rem;color:#666;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px">Haz clic en un punto para ver detalles</div>`;
  return div;
};
legend.addTo(map);

// ============================================================
// BARRA DE ESTADÍSTICAS
// ============================================================
const counts = {};
Object.values(ZONAS).forEach((_, i) => { counts[Object.keys(ZONAS)[i]] = 0; });
municipios.forEach(m => counts[m.zona]++);

const diasCounts = {};
municipios.forEach(m => {
  const cp = (m.cp || '').replace(/\D/g,'').padStart(5,'0');
  const d = (cpDias[cp] || m.dia || 'VARIOS').toUpperCase();
  const key = d.includes('LUNES') && d.includes('VIERNES') ? 'L-X-V / Varios' :
              d.includes('MARTES') && d.includes('JUEVES') ? 'Ma-J / Varios' :
              d.includes('LUNES') && !d.includes(',') ? 'LUNES' :
              d.includes('MARTES') && !d.includes(',') ? 'MARTES' :
              d.includes('MIERCOLES') && !d.includes(',') ? 'MIERCOLES' :
              d.includes('JUEVES') && !d.includes(',') ? 'JUEVES' :
              d.includes('VIERNES') && !d.includes(',') ? 'VIERNES' :
              'VARIOS';
  diasCounts[key] = (diasCounts[key] || 0) + 1;
});

const statsBar = document.getElementById('stats');
Object.entries(ZONAS).forEach(([z, info]) => {
  statsBar.innerHTML += `
    <div class="stat-item">
      <div class="s-zone" style="color:${info.color}">ZONA ${z}</div>
      <div class="s-count">${counts[z]}</div>
      <div class="s-price">${info.total} + IVA</div>
    </div>`;
});
// Separador
statsBar.innerHTML += `<div class="stat-item" style="border-left:2px solid rgba(233,69,96,0.4);min-width:10px"></div>`;
const diasOrder = ['LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','L-X-V / Varios','Ma-J / Varios','VARIOS'];
const diasColors = {'LUNES':'#00bcd4','MARTES':'#8bc34a','MIERCOLES':'#ff9800','JUEVES':'#9c27b0','VIERNES':'#f44336','L-X-V / Varios':'#00acc1','Ma-J / Varios':'#7b1fa2','VARIOS':'#607d8b'};
diasOrder.forEach(d => {
  if (!diasCounts[d]) return;
  statsBar.innerHTML += `
    <div class="stat-item">
      <div class="s-zone" style="color:${diasColors[d]||'#aaa'}">${d}</div>
      <div class="s-count">${diasCounts[d]}</div>
      <div class="s-price">CPs</div>
    </div>`;
});

// ============================================================
// BUSCADOR DE CP
// ============================================================
// Índice CP → {marker, data} construido tras crear todos los marcadores
const cpMarkerIndex = {};
todosMarkersData.forEach(({marker, data}) => {
  data.cps.forEach(cp => {
    const key = cp.replace(/\D/g,'').padStart(5,'0');
    cpMarkerIndex[key] = { marker, data };
  });
});

// Marcador de resaltado para búsqueda
let searchHighlight = null;

function buscarCP() {
  const raw = document.getElementById('cp-input').value.trim();
  const cp  = raw.replace(/\D/g,'').padStart(5,'0');
  const msg = document.getElementById('cp-msg');

  if (!raw || cp.replace(/^0+/,'') === '') {
    msg.textContent = 'Escribe un CP';
    msg.style.color = '#ff9800';
    return;
  }

  // Limpiar resaltado anterior
  if (searchHighlight) { map.removeLayer(searchHighlight); searchHighlight = null; }

  const found = cpMarkerIndex[cp];

  if (found) {
    const { marker, data } = found;

    // Si estaba filtrado, hacerlo visible temporalmente
    if (!map.hasLayer(marker)) marker.addTo(map);

    // Volar al municipio
    map.flyTo([data.lat, data.lon], 13, { duration: 1.2 });

    // Anillo de resaltado animado
    searchHighlight = L.circleMarker([data.lat, data.lon], {
      radius: 18, color: '#fff', weight: 2.5,
      fillColor: ZONAS[data.zona].color, fillOpacity: 0.25,
      className: 'search-pulse'
    }).addTo(map);

    // Rellenar panel info
    const diaVal = data.diaReal || 'PENDIENTE';
    document.getElementById('ip-municipio').textContent = data.mun;
    document.getElementById('ip-provincia').textContent = data.prov;
    document.getElementById('ip-cp').textContent        = data.cps.join(' / ');
    document.getElementById('ip-dist').textContent      = data.dist + ' km';
    const zEl = document.getElementById('ip-zona');
    zEl.textContent   = 'ZONA ' + data.zona;
    zEl.style.background = ZONAS[data.zona].color;
    zEl.style.color   = ['A','B','C'].includes(data.zona) ? '#111' : '#fff';
    const precio = parseInt(ZONAS[data.zona].precio);
    document.getElementById('ip-base').textContent  = precio + ' €';
    document.getElementById('ip-iva').textContent   = (precio * 0.21).toFixed(2) + ' €';
    document.getElementById('ip-total').textContent = (precio * 1.21).toFixed(2) + ' €';
    const diaEl = document.getElementById('ip-dia');
    diaEl.textContent       = diaVal;
    diaEl.style.background  = getDiaColor(diaVal);
    diaEl.style.color       = '#fff';
    document.getElementById('info-panel').style.display = 'block';

    msg.textContent = '✓ ' + data.mun;
    msg.style.color = '#00e676';

  } else if (cpDias[cp]) {
    // CP en la base de días pero sin punto en el mapa (sin coordenadas)
    msg.textContent = 'Sin ubicación en mapa';
    msg.style.color = '#ff9800';

    // Mostrar panel con datos parciales
    document.getElementById('ip-municipio').textContent = 'CP ' + cp;
    document.getElementById('ip-provincia').textContent = cp.startsWith('06') ? 'Badajoz' : 'Cáceres';
    document.getElementById('ip-cp').textContent        = cp;
    document.getElementById('ip-dist').textContent      = '—';
    const zEl = document.getElementById('ip-zona');
    zEl.textContent = '—'; zEl.style.background = '#333'; zEl.style.color = '#aaa';
    document.getElementById('ip-base').textContent  = '—';
    document.getElementById('ip-iva').textContent   = '—';
    document.getElementById('ip-total').textContent = '—';
    const diaEl = document.getElementById('ip-dia');
    diaEl.textContent      = cpDias[cp];
    diaEl.style.background = getDiaColor(cpDias[cp]);
    diaEl.style.color      = '#fff';
    document.getElementById('info-panel').style.display = 'block';

  } else {
    msg.textContent = 'CP no encontrado';
    msg.style.color = '#e94560';
    document.getElementById('info-panel').style.display = 'none';
  }
}
</script>
